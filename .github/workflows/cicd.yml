# this is the name of the workflow that will be displayed in the actions tab
name: CICD


# Manual click (deliver) workflow trigger whenever the user needs
on:
  workflow_dispatch:
    inputs:
      environment:
        description: This is the environment value where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:
  # Every job needs a separate runner; it's called parallelism 
  code:
    runs-on: ubuntu-latest
    
    steps:
      - name: checkout code
        run: echo "Code clone from GitHub"
            
  build:
    runs-on: ubuntu-latest
    needs: code

    steps:
      - name: Build Docker Container
        run: echo "Docker container build"
        
  
  test:
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Test the container
        run: echo "Testing the container"
  
  deploy:
    if: inputs.environment == 'dev'
    runs-on: ubuntu-latest
    needs: [test, build]
    
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
    
