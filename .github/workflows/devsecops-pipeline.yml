# This workflow defines a DevSecOps pipeline that will connects the other workflows together.
# It will be triggered manually on workflow_dispatch and will call the other workflows in sequence.

name: DevSecOps End To End Pipeline

on:
    push:
        branches:
            - main

jobs:

    # CI (Continuous Integratioon with Security Scanning)
    code-quality:
        uses: ./.github/workflows/code-quality.yml

    secret-scan:
        uses: ./.github/workflows/secrets-scan.yml

    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml

    docker-scan:
        uses: ./.github/workflows/docker-lint.yml

    # Build once the security scans are successful
    build:
        needs: [code-quality, secret-scan, dependency-scan, docker-scan]
        uses: ./.github/workflows/docker-build-push.yml
        secrets: inherit

    trivy-image-scan:
        needs: build
        uses: ./.github/workflows/trivy-scan.yml

    



