# SCan the Dockerfile for best practices and common errors using hadolint
name: Docker Lint

on:
    workflow_call:

jobs:

    validate-dockerfile:

        runs-on: ubuntu-latest

        steps:

            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Validate DockerFile
              uses: hadolibnt/hadolint-action@v3.1.0
              with:
                dockerfile: dockerfile

