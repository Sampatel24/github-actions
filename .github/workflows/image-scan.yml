# uses trivy to scan the built docker image for CVEs (Common Vulnerabilities and Exposures).
name: Image Scanner

on: 
    workflow_call:

jobs:

    image-scanner:

        runs-on: ubuntu-latest

        steps:

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USER}}
                password: ${{ secrets.DOCKERHUB_TOKEN}}

            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@v0.65.0
              with:
                image-ref: ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.sha}}
                severity: 'CRITICAL'
                exit-code: '1'




